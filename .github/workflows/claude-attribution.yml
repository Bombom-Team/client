# Track Review Attribution
#
# karrot-emu/community-web-group 에서 이식한 학습 루프의 1단계입니다.
# 머지된 PR에서 AI 리뷰 제안이 어떻게 처리됐는지(accepted/modified/dismissed/ignored)
# 추적해 .review-learnings/attribution-log.md 에 기록하고, chore/review-attribution
# 브랜치에 커밋 + PR을 엽니다.
#
# 필요한 GitHub Secrets:
#   - ANTHROPIC_API_KEY: Anthropic API 키
#
name: Track Review Attribution

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 번호 (수동 실행용)'
        required: true
        type: number

jobs:
  track-attribution:
    # 머지된 PR만 (닫힌 PR 제외)
    if: >
      (github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: attribution-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Get PR number
        id: pr_info
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_number=$INPUT_PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}

      - name: Check for review meta
        id: review_check
        run: |
          PR_NUM="${{ steps.pr_info.outputs.pr_number }}"
          # PR review body에서 REVIEW_META 존재 확인
          # (claude[bot]은 issue comment가 아닌 PR review로 리뷰를 제출함)
          HAS_META=$(gh api "repos/${REPO}/pulls/${PR_NUM}/reviews" \
            --jq '[.[] | select(.body | contains("<!-- REVIEW_META"))] | length' 2>/dev/null || echo "0")
          echo "has_meta=$HAS_META" >> $GITHUB_OUTPUT
          echo "📋 Review meta found in PR reviews: $HAS_META"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Checkout main
        if: fromJSON(steps.review_check.outputs.has_meta) >= 1
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git and load branch data
        if: fromJSON(steps.review_check.outputs.has_meta) >= 1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 브랜치에 누적된 attribution-log가 있으면 가져와서 Claude가 누적 데이터 위에 작업하도록
          BRANCH="chore/review-attribution"
          if git fetch origin "$BRANCH" 2>/dev/null; then
            git checkout "origin/$BRANCH" -- .review-learnings/attribution-log.md 2>/dev/null || true
            echo "📋 Loaded accumulated attribution-log from $BRANCH"
          fi

      - name: Track attribution
        if: fromJSON(steps.review_check.outputs.has_meta) >= 1
        uses: anthropics/claude-code-action@v1.0.112
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            당신은 리뷰 Attribution 추적 에이전트입니다.
            머지된 PR의 AI 리뷰 제안이 어떻게 처리되었는지 추적합니다.

            ## PR 정보
            - Repository: ${{ github.repository }}
            - PR Number: ${{ steps.pr_info.outputs.pr_number }}

            ## 작업 순서

            ### 1. REVIEW_META 추출
            - mcp__github__get_pull_request_reviews로 PR 리뷰를 조회하세요
              (claude[bot]은 issue comment가 아닌 PR review로 리뷰를 제출합니다)
            - claude[bot]의 review body에서 `<!-- REVIEW_META` ... `-->` 블록을 찾아 JSON을 추출하세요
            - 여러 review가 있으면(증분 리뷰 등) 모든 review에서 REVIEW_META를 추출하세요
            - JSON 파싱에 실패하면 종료하세요

            ### 2. 각 finding의 결과 판정

            먼저, REVIEW_META의 `review_sha` (또는 review 객체의 `commit_id`)를 확인하세요.
            이것이 리뷰 시점의 커밋입니다. 최종 머지 커밋과 비교하여 변경 여부를 판정합니다.

            각 finding에 대해:

            1. **git diff로 실제 변경 확인**: `git diff {review_sha}..HEAD -- {file}`로 리뷰 이후 해당 파일의 변경사항을 확인
               - 파일이 삭제되었으면 → 해당 이슈는 코드와 함께 제거됨 (accepted로 분류)
               - 파일에 변경이 없으면 → 해당 라인은 수정되지 않음
            2. **라인 범위 변경 확인**: diff 출력에서 finding의 `line`~`lineEnd` 범위가 변경되었는지 확인
            3. **인라인 코멘트 reply 확인**: mcp__github__get_pull_request_review_comments로 해당 finding의 인라인 코멘트에 reply가 있는지 확인

            **판정 기준:**
            - **accepted**: finding의 라인 범위가 변경되었고, suggestion과 유사한 방향으로 수정됨 (또는 GitHub suggestion commit 존재)
            - **modified**: finding의 라인 범위가 변경되었지만, suggestion과 다른 방식으로 수정됨
            - **dismissed**: 반박 reply가 존재하거나 `.review-learnings/false-positives.md`에 기록됨
            - **ignored**: git diff에서 해당 라인 범위에 변경 없음 + reply 없음

            ### 3. attribution-log.md 업데이트
            `.review-learnings/attribution-log.md`를 Read로 읽은 뒤:

            **A) 이력 섹션에 PR별 결과 추가:**
            ```markdown
            ### PR #{번호} — {오늘 날짜 YYYY-MM-DD}

            | Finding | Agent | Severity | Confidence | Outcome | Method |
            |---------|-------|----------|------------|---------|--------|
            | {제목} | {agent} | {severity} | {conf} | {outcome} | {method} |
            ```

            **B) 집계 통계 테이블 업데이트:**
            - 각 Agent별 Total, Accepted, Modified, Dismissed, Ignored 카운트 증가
            - Accuracy = (Accepted + Modified) / Total × 100%

            ### 4. 주의사항
            - 기존 이력은 절대 삭제하지 마세요
            - findings가 0개이면 아무것도 하지 마세요
            - REVIEW_META가 없거나 파싱 실패 시 종료하세요

          claude_args: |
            --model ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "
              Read, Edit, Glob, Grep,
              Bash(git diff *),
              Bash(git log *),
              Bash(git show *),
              Bash(jq *),
              Bash(gh api *),
              mcp__github__get_issue_comments,
              mcp__github__get_pull_request_comments,
              mcp__github__get_pull_request_review_comments,
              mcp__github__get_pull_request_reviews,
              mcp__github__get_pull_request,
              mcp__github__get_pull_request_files
            "

      - name: Commit and push attribution
        id: commit
        if: fromJSON(steps.review_check.outputs.has_meta) >= 1
        run: |
          if git diff --quiet .review-learnings/attribution-log.md; then
            echo "tracked=false" >> $GITHUB_OUTPUT
            echo "⏭️ No attribution changes"
            exit 0
          fi

          # Claude의 수정을 임시 저장
          cp .review-learnings/attribution-log.md /tmp/attribution-log-edited.md

          BRANCH="chore/review-attribution"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 브랜치를 main 기반으로 리셋 (있으면 리셋, 없으면 생성. merge 불필요 — Claude 출력에 누적 데이터 포함)
          git checkout -f -B "$BRANCH" "origin/$DEFAULT_BRANCH"

          # Claude의 수정을 복원
          cp /tmp/attribution-log-edited.md .review-learnings/attribution-log.md
          git add .review-learnings/attribution-log.md

          COMMIT_MSG=$(printf 'chore: track review attribution from PR #%s\n\n🤖 Auto-tracked by Review Attribution' "$PR_NUM")
          git commit -m "$COMMIT_MSG"

          # push (checkout -B로 리셋했으므로 force push)
          git push origin "$BRANCH" -u --force

          # 열린 PR이 없으면 새로 생성
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --head "$BRANCH" \
              --title "chore: review attribution 업데이트" \
              --body "🤖 AI 리뷰 제안의 수락/거절/무시 이력을 자동으로 기록합니다." || true
            echo "📋 New PR created for attribution"
          else
            echo "📋 Attribution PR already exists: #${EXISTING_PR}"
          fi

          echo "tracked=true" >> $GITHUB_OUTPUT
          echo "✅ Attribution tracked for PR #${PR_NUM}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.pr_info.outputs.pr_number }}
