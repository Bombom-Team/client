# Weekly Review Report
#
# karrot-emu/community-web-group 에서 이식. attribution 데이터를 바탕으로 주간
# 리뷰 에이전트 성과 리포트를 .review-learnings/reports/{YYYY}-W{WW}.md 에
# 생성하고 chore/review-report 브랜치에 커밋 + PR을 엽니다.
#
# 필요한 GitHub Secrets:
#   - ANTHROPIC_API_KEY: Anthropic API 키
# 전제: .review-learnings/attribution-log.md 에 attribution 데이터가 있어야 합니다.
#
name: Weekly Review Report

on:
  schedule:
    # 매주 월요일 오전 9시경 (KST) = 일요일 자정 무렵 (UTC)
    # GitHub Actions는 정시 부하 분산을 위해 정시(:00)를 피하길 권장 → 00:07 UTC
    - cron: '7 0 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check attribution data
        id: attr_check
        run: |
          ATTR_CONTENT=$(gh api "repos/${REPO}/contents/.review-learnings/attribution-log.md" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          HAS_DATA=$(echo "$ATTR_CONTENT" | grep -c "^### PR #" || echo "0")
          echo "has_data=$HAS_DATA" >> $GITHUB_OUTPUT
          echo "📋 Attribution entries: $HAS_DATA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Checkout main
        if: fromJSON(steps.attr_check.outputs.has_data) >= 1
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: fromJSON(steps.attr_check.outputs.has_data) >= 1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure reports directory
        if: fromJSON(steps.attr_check.outputs.has_data) >= 1
        run: mkdir -p .review-learnings/reports

      - name: Generate Report
        if: fromJSON(steps.attr_check.outputs.has_data) >= 1
        uses: anthropics/claude-code-action@v1.0.112
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            당신은 리뷰 에이전트 성과 리포트 생성기입니다.
            Attribution 데이터와 PR 활동을 분석하여 주간 리포트를 생성합니다.

            ## 정보
            - Repository: ${{ github.repository }}
            - 오늘 날짜: $(date +%Y-%m-%d)
            - 이번 주차: $(date +%Y)-W$(date +%V)

            ## 작업 순서

            ### 1. 데이터 수집
            다음 파일을 Read로 읽으세요:
            - `.review-learnings/attribution-log.md` — 전체 attribution 이력

            ### 2. 통계 산출

            **A) 전체 기간 통계** (집계 테이블에서):
            - 에이전트별 Total, Accepted, Modified, Dismissed, Ignored, Accuracy

            **B) 최근 1주 통계** (이력 섹션에서 최근 7일의 PR만):
            - 리뷰된 PR 수
            - 에이전트별 findings 수, acceptance rate
            - 심각도별 분포 (Critical/Major/Minor)
            - 카테고리별 분포와 acceptance rate

            **C) 커버리지** (gh CLI 사용):
            - `gh pr list --state merged --limit 50 --json number,mergedAt`로 최근 1주 머지된 PR 수
            - `gh api repos/${{ github.repository }}/pulls/{number}/reviews`로 봇 리뷰 존재 여부 확인 (최근 1주 PR만)
            - 커버리지 = 봇 리뷰가 있는 PR / 전체 머지 PR

            **D) 이전 주차 리포트 비교** (있으면):
            - `.review-learnings/reports/` 디렉토리에서 직전 주차 파일을 Read
            - 트렌드 계산 (에이전트별 Accuracy 변화: ↑/↓/→)

            ### 3. 리포트 작성

            `.review-learnings/reports/$(date +%Y)-W$(date +%V).md`에 Write로 작성하세요:

            ```markdown
            # Review Agent 주간 리포트 — {YYYY}-W{WW}

            > 기간: {시작일} ~ {종료일}

            ## 요약

            | 지표 | 값 |
            |------|-----|
            | 리뷰 커버리지 | {M}/{N} PR ({X}%) |
            | 실질 기여율 | {Y}% (accepted + modified / total) |
            | 버그 차단 | Critical {A}건, Major {B}건 accepted |
            | 노이즈 비율 | {Z}% (ignored / total) |

            ## 에이전트별 성과

            | Agent | 이번 주 Findings | Accepted | Accuracy | 전체 Accuracy | Trend |
            |-------|-----------------|----------|----------|--------------|-------|
            | Bug & Logic | {n} | {n} | {x}% | {y}% | ↑/↓/→ |
            | Convention & Pattern | {n} | {n} | {x}% | {y}% | ↑/↓/→ |

            ## Skeptic 검증 효과

            | 지표 | 값 |
            |------|-----|
            | Critical/Major 후보 | {n}건 |
            | Skeptic invalid 판정 (제거) | {n}건 |
            | 최종 인라인 코멘트 | {n}건 |
            | False positive 차단율 | {x}% |

            ## 심각도별 분포

            | Severity | Count | Accepted | Rate |
            |----------|-------|----------|------|
            | Critical | {n} | {n} | {x}% |
            | Major | {n} | {n} | {x}% |
            | Minor | {n} | {n} | {x}% |

            ## 카테고리별 분포 (이번 주)

            | Category | Count | Accepted | Ignored | Rate |
            |----------|-------|----------|---------|------|
            | {cat} | {n} | {n} | {n} | {x}% |

            ## 개선 포인트

            {ignored 비율이 높은 카테고리/에이전트 식별}
            - {카테고리}: ignored {n}건 — 정확도 개선 필요
            {accepted 비율이 높은 카테고리/에이전트 칭찬}
            - {카테고리}: accepted {n}건 — 잘 작동 중

            ## 학습 현황

            | 파일 | 항목 수 |
            |------|---------|
            | false-positives.md | {n}개 |
            | additional-rules.md | {n}개 |
            | patterns.md | {n}개 |
            ```

            ### 4. 주의사항
            - 데이터가 부족한 항목은 "-"로 표시하세요
            - 이전 주차 리포트가 없으면 Trend는 "→"로 표시
            - 한국어로 작성하세요
            - 기존 리포트 파일이 있으면 덮어쓰세요 (같은 주차에 재실행 시)

          claude_args: |
            --model ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "
              Read, Write, Glob, Grep,
              Bash(date *),
              Bash(gh api *),
              Bash(gh pr *),
              Bash(wc *)
            "

      - name: Commit and push report
        id: commit
        if: fromJSON(steps.attr_check.outputs.has_data) >= 1
        run: |
          if git diff --quiet .review-learnings/reports/ 2>/dev/null && \
             [ -z "$(git ls-files --others --exclude-standard .review-learnings/reports/)" ]; then
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "⏭️ No report generated"
            exit 0
          fi

          BRANCH="chore/review-report"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch || 'main' }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 브랜치를 main 기반으로 리셋 (merge 불필요 — Claude 출력에 전체 데이터 포함)
          git checkout -f -B "$BRANCH" "origin/$DEFAULT_BRANCH"

          git add .review-learnings/reports/

          WEEK=$(date +%Y-W%V)
          COMMIT_MSG=$(printf 'chore: generate review report %s\n\n🤖 Auto-generated by Review Report' "$WEEK")
          git commit -m "$COMMIT_MSG"

          git push origin "$BRANCH" -u --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --head "$BRANCH" \
              --title "chore: review report $WEEK" \
              --body "🤖 주간 리뷰 에이전트 성과 리포트입니다." \
          fi

          echo "generated=true" >> $GITHUB_OUTPUT
          echo "✅ Report committed: $WEEK"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
