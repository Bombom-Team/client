# Learn from Review Feedback
#
# karrot-emu/community-web-group 에서 이식한 학습 루프의 즉시 피드백 채널입니다.
# 봇 리뷰 코멘트에 사용자가 reply(반박/정정)를 달면 실행되어, 그 피드백을
# false-positives.md 에 반영하고 해당 PR 브랜치에 커밋합니다.
#
# 필요한 GitHub Secrets:
#   - ANTHROPIC_API_KEY: Anthropic API 키
#
name: Learn from Review Feedback

on:
  pull_request_review_comment:
    types:
      - created
  issue_comment:
    types:
      - created

jobs:
  learn-feedback:
    # Claude 리뷰에 대한 답글이거나, 반박 키워드/명령어가 포함된 경우 실행
    # 봇의 "학습 완료" reply는 무한루프 방지를 위해 제외
    if: >
      (github.event_name == 'pull_request_review_comment' &&
        github.event.comment.in_reply_to_id != null &&
        github.event.comment.user.type == 'User' &&
        !contains(github.event.comment.body, '✅ **학습 완료**')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.comment.user.type == 'User' &&
        !contains(github.event.comment.body, '✅ **학습 완료**') &&
        (contains(github.event.comment.body, '/claude-learn') ||
         contains(github.event.comment.body, '틀렸') ||
         contains(github.event.comment.body, '잘못') ||
         contains(github.event.comment.body, '의도한') ||
         contains(github.event.comment.body, '괜찮') ||
         contains(github.event.comment.body, 'false positive')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: learn-feedback-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Get PR info
        id: pr_info
        run: |
          if [ "$EVENT_NAME" == "pull_request_review_comment" ]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
          else
            PR_DATA=$(gh api "$PR_URL")
            echo "pr_number=$(echo "$PR_DATA" | jq -r '.number')" >> $GITHUB_OUTPUT
            echo "head_ref=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.issue.pull_request.url }}

      - name: Check if reply is to Claude bot
        id: bot_check
        run: |
          if [ "$EVENT_NAME" == "pull_request_review_comment" ]; then
            # Fetch parent comment to check author and content
            PARENT_DATA=$(gh api "repos/${REPO}/pulls/comments/${REPLY_TO_ID}" 2>/dev/null || echo "{}")
            PARENT_TYPE=$(echo "$PARENT_DATA" | jq -r '.user.type // ""')
            PARENT_BODY=$(echo "$PARENT_DATA" | jq -r '.body // ""')

            # Bot type AND contains PR Review marker
            if [ "$PARENT_TYPE" == "Bot" ] && echo "$PARENT_BODY" | grep -qE "\[(Critical|Major|Minor)\]|잘못된 지적이면 reply로 알려주세요"; then
              echo "is_bot_reply=true" >> $GITHUB_OUTPUT
              printf '%s' "$PARENT_BODY" > /tmp/bot-comment.txt
              echo "✅ Bot review comment detected"
            else
              echo "is_bot_reply=false" >> $GITHUB_OUTPUT
              echo "⏭️ Not a bot review comment, skipping"
            fi
          else
            # issue_comment은 키워드 기반이므로 통과
            echo "is_bot_reply=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPLY_TO_ID: ${{ github.event.comment.in_reply_to_id }}
          REPO: ${{ github.repository }}

      - name: Save user reply to file
        if: steps.bot_check.outputs.is_bot_reply == 'true'
        run: printf '%s' "$REPLY_BODY" > /tmp/user-reply.txt
        env:
          REPLY_BODY: ${{ github.event.comment.body }}

      - name: Checkout PR branch
        if: steps.bot_check.outputs.is_bot_reply == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.head_ref }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: steps.bot_check.outputs.is_bot_reply == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Learn from Feedback
        if: steps.bot_check.outputs.is_bot_reply == 'true'
        uses: anthropics/claude-code-action@v1.0.112
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            사용자가 Multi-Agent PR Review의 리뷰 코멘트에 피드백을 남겼습니다.
            이 피드백을 분석하여 학습 데이터를 업데이트하세요.

            <CONTEXT>
            - PR: #${{ steps.pr_info.outputs.pr_number }}
            - 이벤트 타입: ${{ github.event_name }}
            - Reply author: ${{ github.event.comment.user.login }}
            - Comment URL: ${{ github.event.comment.html_url }}
            ${{ github.event_name == 'pull_request_review_comment' && format('- 답글 대상 코멘트 ID: {0}', github.event.comment.in_reply_to_id) || '' }}
            </CONTEXT>

            ## Step 1: 코멘트 내용 확인

            ${{ github.event_name == 'pull_request_review_comment' && '- `/tmp/bot-comment.txt` → 봇의 원본 리뷰 코멘트\n- `/tmp/user-reply.txt` → 사용자의 reply\n두 파일을 Read 도구로 읽으세요.' || '- `/tmp/user-reply.txt` → 사용자의 코멘트를 Read로 읽으세요\n- mcp__github__get_pull_request_comments를 사용하여 해당 PR의 봇 리뷰 코멘트를 조회하세요\n- 사용자 코멘트 내용과 관련된 봇 코멘트를 찾으세요' }}

            ## Step 2: Reply 유형 판별

            **반박/정정 (→ 학습 대상)**:
            - "이건 틀렸어", "잘못된 지적이야", "이건 아닌데"
            - "이건 의도한 거야", "이건 괜찮아"
            - "이 프로젝트에서는 이게 맞아"
            - 기술적 근거를 들어 지적이 부적절함을 설명하는 경우

            **동의/수용 또는 질문 (→ 학습 불필요)**:
            - "좋은 지적이야", "수정할게", "맞아", "고칠게"
            - "왜 이게 문제야?", 추가 정보 요청

            **반박이 아니면 아무 파일도 수정하지 말고 즉시 종료하세요.**

            ## Step 3: 반박인 경우 학습 데이터 추가

            1. 원본 봇 코멘트에서 파싱:
               - 심각도: `[Critical]`, `[Major]`, `[Minor]` 태그
               - 지적 내용: 코멘트 본문
               - 에이전트명: 코멘트 본문이나 리뷰 본문의 REVIEW_META JSON에서 추출
            2. `.review-learnings/false-positives.md`를 Read로 읽기
            3. 파일 맨 끝에 아래 형식의 엔트리를 Edit으로 추가

            ### 학습 엔트리 형식

            ```
            ### [{주요 에이전트}] {지적 제목 요약}

            - **날짜**: YYYY-MM-DD
            - **원래 심각도**: critical | major | minor
            - **조정**: ignore | lower_severity | context_dependent
            - **PR**: #번호

            **AI의 지적**:

            > {봇 코멘트에서 핵심 지적 내용 1-2줄 요약}

            **반박/설명**:

            > {사용자 reply 내용 요약}

            **예외 조건** (context_dependent인 경우):

            - {언제 지적해야 하고 언제 무시해야 하는지}
            ```

            ### 조정 타입 결정 기준

            - **ignore**: "이건 절대 문제 아니야" → 앞으로 완전 무시
            - **lower_severity**: "문제이긴 한데 심각하진 않아" → 심각도만 낮춤
            - **context_dependent**: "이 경우에는 괜찮아" → 예외 조건 필수 작성

            ## 중요 규칙

            - 반박이 아닌 reply에는 절대 파일을 수정하지 마세요
            - 엔트리는 기존 내용 뒤에 추가하세요 (기존 내용 삭제 금지)
            - 이미 동일한 패턴이 기록되어 있으면 중복 추가하지 마세요
            - 한국어로 작성하세요

          claude_args: |
            --model ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "
              Read, Edit, Glob, Grep,
              mcp__github__get_pull_request_comments,
              mcp__github__get_pull_request_reviews,
              mcp__github__get_pull_request,
              mcp__github__get_pull_request_files
            "

      - name: Commit and push learnings
        id: commit
        if: steps.bot_check.outputs.is_bot_reply == 'true'
        run: |
          if git diff --quiet .review-learnings/; then
            echo "learned=false" >> $GITHUB_OUTPUT
            echo "⏭️ No learning changes (reply was not a rebuttal)"
            exit 0
          fi

          git add .review-learnings/false-positives.md
          COMMIT_MSG=$(printf 'chore: learn from PR review feedback (#%s)\n\nComment: %s\n\n🤖 Auto-learned by Multi-Agent PR Review' "$PR_NUM" "$COMMENT_URL")
          git commit -m "$COMMIT_MSG"

          # Push to PR branch (re-set remote URL since claude-code-action may reset credentials)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push

          echo "learned=true" >> $GITHUB_OUTPUT
          echo "✅ Learning committed to PR branch"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.pr_info.outputs.pr_number }}
          COMMENT_URL: ${{ github.event.comment.html_url }}

      - name: Notify learning result
        if: steps.bot_check.outputs.is_bot_reply == 'true' && steps.commit.outputs.learned == 'true'
        run: |
          # Add rocket reaction to user's comment
          if [ "$EVENT_NAME" == "pull_request_review_comment" ]; then
            gh api "repos/${REPO}/pulls/comments/${COMMENT_ID}/reactions" \
              -f content='rocket' --silent || true

            # Reply to confirm learning
            gh api "repos/${REPO}/pulls/${PR_NUM}/comments/${PARENT_ID}/replies" \
              --method POST \
              -f body='✅ **학습 완료** — 이 피드백이 `false-positives.md`에 반영되었습니다. 다음 리뷰부터 이 패턴은 조정된 기준으로 평가됩니다.' \
              || true
          else
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content='rocket' --silent || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUM: ${{ steps.pr_info.outputs.pr_number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PARENT_ID: ${{ github.event.comment.in_reply_to_id }}

      - name: Cleanup tmp files
        if: always()
        run: |
          rm -f /tmp/bot-comment.txt /tmp/user-reply.txt
          echo "🧹 Cleaned up tmp files"
