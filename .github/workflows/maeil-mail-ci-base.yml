name: Maeil Mail CI Base

on:
  workflow_call:
    inputs:
      run-build:
        required: false
        type: boolean
        default: false

jobs:
  maeil-mail-checks:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack & Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Setup pnpm store
        working-directory: ./maeil-mail
        run: pnpm config set store-dir $GITHUB_WORKSPACE/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pnpm-store
          key: bombom-pnpm-store

      - name: Install dependencies
        working-directory: ./maeil-mail
        run: pnpm install --filter @bombom/maeil-mail... --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm run maeil-mail:lint

      - name: Type Check
        run: pnpm run maeil-mail:type-check

      - name: Build
        if: inputs.run-build == true
        env:
          VITE_API_BASE_URL: ${{ vars.MAEIL_MAIL_API_BASE_URL }}
        run: pnpm run maeil-mail:build

      - name: Upload dist artifact
        if: inputs.run-build == true
        uses: actions/upload-artifact@v4
        with:
          name: maeil-mail-dist
          path: maeil-mail/dist
