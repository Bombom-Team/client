# Auto-Resolve Addressed Review Comments
#
# karrot-emu/community-web-group 에서 이식. PR Review Agent 가 남긴 인라인 코멘트가
# 새 커밋에서 반영되면 해당 review thread 를 자동으로 resolve 합니다.
#
# 설정 가이드:
# 1. 필요한 GitHub Secrets:
#    - ANTHROPIC_API_KEY: Anthropic API 키 (claude-review.yml 과 동일한 시크릿)
# 2. 선택적 GitHub Variables:
#    - CLAUDE_RESOLVE_MODEL: 사용 모델 (기본값: claude-haiku-4-5-20251001)
#    - CLAUDE_REVIEW_BOT_LOGIN: 리뷰 봇 계정 login (기본값: github-actions[bot])
#      · claude-review.yml 이 anthropic_api_key 만으로 동작하면 리뷰 author 는
#        github-actions[bot] 입니다. 첫 리뷰 실행 후 실제 author login 을 확인해
#        다르면 이 Variable 을 설정하세요:
#        gh pr view <PR> --json reviews --jq '.reviews[].author.login'
#
name: Auto-Resolve Addressed Review Comments

on:
  pull_request:
    types: [synchronize]

jobs:
  auto-resolve:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: auto-resolve-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check for force push
        id: check
        run: |
          if git merge-base --is-ancestor "$BEFORE_SHA" "$AFTER_SHA" 2>/dev/null; then
            echo "is_forced=false" >> $GITHUB_OUTPUT
          else
            echo "is_forced=true" >> $GITHUB_OUTPUT
            echo "Force push detected. Skipping auto-resolve."
          fi
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}

      - name: Identify candidate threads
        id: candidates
        if: steps.check.outputs.is_forced == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"
          # 리뷰 봇 계정 login. anthropic_api_key 만으로 동작 시 github-actions[bot].
          # Claude GitHub App 등 다른 계정이면 CLAUDE_REVIEW_BOT_LOGIN Variable 로 덮어쓰기.
          BOT_LOGIN="${{ vars.CLAUDE_REVIEW_BOT_LOGIN || 'github-actions[bot]' }}"

          echo "📋 PR #${PR_NUMBER}: Checking addressed review comments..."
          echo "   Commits: ${BEFORE_SHA:0:7}..${AFTER_SHA:0:7}"
          echo "   Bot login: ${BOT_LOGIN}"

          # 1. Build modified files list
          MODIFIED_FILES_FILE=$(mktemp)
          git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" > "$MODIFIED_FILES_FILE" 2>/dev/null || true

          MODIFIED_COUNT=$(wc -l < "$MODIFIED_FILES_FILE" | tr -d ' ')
          echo "   Modified files: ${MODIFIED_COUNT}"

          if [ "$MODIFIED_COUNT" -eq 0 ]; then
            echo "⏭️ No modified files. Skipping."
            echo "candidate_count=0" >> $GITHUB_OUTPUT
            rm -f "$MODIFIED_FILES_FILE"
            exit 0
          fi

          # 2. Get unresolved bot review threads with comment body
          THREADS=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      isOutdated
                      path
                      line
                      comments(first: 1) {
                        nodes {
                          author { login }
                          body
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner="$OWNER" -f repo="$REPO" -F pr="$PR_NUMBER")

          # 3. Extract unresolved bot threads to JSON
          echo "$THREADS" | jq -c "[
            .data.repository.pullRequest.reviewThreads.nodes[] |
            select(.isResolved == false) |
            select(.comments.nodes[0].author.login == \"$BOT_LOGIN\")
          ]" > /tmp/unresolved_threads.json

          TOTAL=$(jq 'length' /tmp/unresolved_threads.json)
          if [ "$TOTAL" -eq 0 ]; then
            echo "✅ No unresolved bot review threads."
            echo "candidate_count=0" >> $GITHUB_OUTPUT
            rm -f "$MODIFIED_FILES_FILE"
            exit 0
          fi
          echo "   Unresolved bot threads: ${TOTAL}"

          # 4. Classify: candidate (file modified) vs non-candidate
          echo "[]" > /tmp/candidates.json
          CANDIDATE_COUNT=0

          for i in $(seq 0 $((TOTAL - 1))); do
            THREAD=$(jq -c ".[$i]" /tmp/unresolved_threads.json)
            THREAD_ID=$(echo "$THREAD" | jq -r '.id')
            PATH_VAL=$(echo "$THREAD" | jq -r '.path // ""')
            LINE_VAL=$(echo "$THREAD" | jq -r '.line // 0')
            BODY=$(echo "$THREAD" | jq -r '.comments.nodes[0].body // ""')

            # File-level matching: 해당 파일이 수정되었으면 candidate
            if grep -qFx "$PATH_VAL" "$MODIFIED_FILES_FILE" 2>/dev/null; then
              FILE_DIFF=$(git diff -U5 "$BEFORE_SHA" "$AFTER_SHA" -- "$PATH_VAL" 2>/dev/null | head -80)

              jq --arg tid "$THREAD_ID" --arg p "$PATH_VAL" --argjson l "$LINE_VAL" \
                 --arg body "$BODY" --arg diff "$FILE_DIFF" \
                 '. + [{thread_id: $tid, path: $p, line: $l, comment_body: $body, file_diff: $diff}]' \
                 /tmp/candidates.json > /tmp/candidates_tmp.json && mv /tmp/candidates_tmp.json /tmp/candidates.json

              CANDIDATE_COUNT=$((CANDIDATE_COUNT + 1))
            else
              echo "   ⏭️ File not modified: ${PATH_VAL}"
            fi
          done

          echo "   Candidates for AI verification: ${CANDIDATE_COUNT}"
          echo "candidate_count=${CANDIDATE_COUNT}" >> $GITHUB_OUTPUT

          rm -f "$MODIFIED_FILES_FILE"

      - name: Verify and resolve with AI
        if: steps.candidates.outputs.candidate_count != '0'
        uses: anthropics/claude-code-action@v1.0.112
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            당신은 리뷰 코멘트 자동 resolve 에이전트입니다.
            `/tmp/candidates.json`에 AI 리뷰 봇이 남긴 인라인 코멘트와 해당 파일의 diff가 있습니다.
            각 코멘트의 수정 제안이 새 커밋에서 올바르게 반영되었는지 판단하고, 반영되었으면 resolve하세요.

            ## 판단 기준
            - 코멘트가 지적한 핵심 문제가 해결되었으면 → resolve
            - 코멘트와 무관한 변경이거나 핵심 문제가 여전하면 → 건너뛰기
            - 부분적으로만 반영된 경우 → 건너뛰기

            ## 작업 순서
            1. `/tmp/candidates.json`을 Read로 읽으세요. 각 항목:
               - `thread_id`: GitHub review thread ID
               - `path`: 파일 경로
               - `line`: 코멘트가 달린 줄 번호
               - `comment_body`: 봇이 남긴 리뷰 코멘트
               - `file_diff`: 해당 파일의 변경사항 (before → after)

            2. 각 candidate의 comment_body 지적이 file_diff에서 해결되었는지 판단하세요

            3. 해결된 thread는 다음 명령어로 resolve:
               ```
               gh api graphql -f query='mutation($id:ID!){resolveReviewThread(input:{threadId:$id}){thread{id isResolved}}}' -f id="THREAD_ID값"
               ```

            4. 최종 결과를 요약: N개 resolved, M개 kept open

          claude_args: |
            --model ${{ vars.CLAUDE_RESOLVE_MODEL || 'claude-haiku-4-5-20251001' }}
            --allowedTools "Read, Bash(gh api *)"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/candidates.json /tmp/unresolved_threads.json
