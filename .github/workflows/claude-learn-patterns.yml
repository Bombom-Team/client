# Learn from Attribution Data
#
# karrot-emu/community-web-group 에서 이식한 학습 루프의 2단계입니다.
# Track Review Attribution 워크플로우가 끝나면 실행되어, attribution-log.md 의
# 누적 데이터(AI 제안 수락/거절/무시 이력)를 분석해 patterns.md /
# false-positives.md / additional-rules.md 를 갱신하고 chore/review-learnings
# 브랜치에 커밋 + PR을 엽니다.
#
# 필요한 GitHub Secrets:
#   - ANTHROPIC_API_KEY: Anthropic API 키
# 전제: claude-attribution.yml 이 먼저 실행되어 attribution 데이터가 쌓여 있어야 합니다.
#
name: Learn from Attribution Data

on:
  workflow_run:
    workflows: ['Track Review Attribution']
    types:
      - completed
  workflow_dispatch:

jobs:
  learn-from-attribution:
    # attribution 워크플로우가 성공적으로 완료되었을 때만 실행
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: review-learn-main-push
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check attribution data
        id: attr_check
        run: |
          # attribution-log.md에 실제 이력 데이터가 있는지 확인
          ATTR_CONTENT=$(gh api "repos/${REPO}/contents/.review-learnings/attribution-log.md" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          HAS_DATA=$(echo "$ATTR_CONTENT" | grep -c "^### PR #" || echo "0")
          echo "has_data=$HAS_DATA" >> $GITHUB_OUTPUT
          echo "📋 Attribution log entries: $HAS_DATA"

          # 최소 3개 PR의 이력이 있어야 패턴 학습이 의미 있음
          if [ "$HAS_DATA" -lt 3 ]; then
            echo "⏭️ Not enough data yet (need 3+ PRs, have $HAS_DATA)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Checkout main
        if: fromJSON(steps.attr_check.outputs.has_data) >= 3
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git and load branch data
        if: fromJSON(steps.attr_check.outputs.has_data) >= 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 브랜치에 누적된 learnings 파일이 있으면 가져옴
          BRANCH="chore/review-learnings"
          if git fetch origin "$BRANCH" 2>/dev/null; then
            for f in patterns.md false-positives.md additional-rules.md archived-patterns.md; do
              git checkout "origin/$BRANCH" -- ".review-learnings/$f" 2>/dev/null || true
            done
            echo "📋 Loaded accumulated learnings from $BRANCH"
          fi

      - name: Learn from Attribution
        if: fromJSON(steps.attr_check.outputs.has_data) >= 3
        uses: anthropics/claude-code-action@v1.0.112
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            당신은 리뷰 패턴 학습 에이전트입니다.
            Attribution 데이터(AI 리뷰 제안의 수락/거절/무시 이력)를 분석하여 리뷰 품질을 개선합니다.

            ## 작업 순서

            ### 1. 학습 파일 읽기
            다음 파일들을 모두 Read로 읽으세요:
            - `.review-learnings/attribution-log.md` — AI 제안 수락/거절/무시 이력
            - `.review-learnings/false-positives.md` — 기존 false positive 기록
            - `.review-learnings/patterns.md` — 기존 학습 패턴
            - `.review-learnings/additional-rules.md` — 승격된 규칙

            ### 2. Attribution 데이터 분석
            attribution-log.md의 이력 섹션에서 모든 PR의 finding 결과를 수집하세요.

            각 finding에서 추출할 정보:
            - Agent명, Severity, Category (제목에서 추론), Outcome (accepted/modified/dismissed/ignored)

            다음 패턴을 식별하세요:

            **A) 반복 ignored 패턴 (false-positive 후보)**:
            - **Minor만 대상**: 같은 Agent의 비슷한 제목/카테고리에서 3회 이상 ignored → false-positives.md에 추가
            - **Critical/Major는 자동 등록하지 않음**: 대신 patterns.md에 "Critical인데 반복 무시됨" 경고로 기록 (진짜 문제인데 개발자가 무시하는 것일 수 있음)
            - 같은 Agent의 비슷한 제목/카테고리에서 3회 이상 dismissed → false-positives.md에 추가 (severity 무관, 명시적 반박이므로)

            **B) 반복 accepted 패턴 (규칙 승격 후보)**:
            - 같은 Agent의 비슷한 카테고리에서 3회 이상 accepted/modified → additional-rules.md 승격 후보
            - 이 패턴이 이미 additional-rules.md에 있으면 `last_verified`를 오늘 날짜로 업데이트

            **C) 에이전트 정확도 추이**:
            - 집계 통계 테이블에서 각 에이전트의 Accuracy를 확인
            - Accuracy < 50%인 에이전트가 있으면 patterns.md에 주의 사항으로 기록

            ### 3. false-positives.md 업데이트

            패턴 A에서 식별된 false-positive 후보를 추가하세요:
            ```markdown
            ### [{에이전트명}] {지적 제목 요약}

            - **날짜**: {오늘 YYYY-MM-DD}
            - **원래 심각도**: {severity}
            - **조정**: ignore
            - **PR**: #{PR1}, #{PR2}, #{PR3}
            - **source**: attribution-analysis

            **AI의 지적**:

            > {반복된 지적 내용 요약}

            **분석 근거**:

            > {N}회 ignored — 개발자들이 일관적으로 이 유형의 지적을 무시
            ```

            이미 동일한 패턴이 기록되어 있으면 중복 추가하지 마세요.

            ### 4. additional-rules.md 업데이트

            패턴 B에서 식별된 승격 후보를 추가하세요:
            ```markdown
            ### [{카테고리}] {규칙 제목}

            - **적용 대상**: {파일 패턴, 파악 가능하면}
            - **심각도**: {severity}
            - **추가일**: {오늘 YYYY-MM-DD}
            - **last_verified**: {오늘 YYYY-MM-DD}
            - **근거**: attribution 분석 — {N}회 accepted/modified ({PR 목록})

            **규칙 설명**:
            {반복 accepted된 지적을 일반화된 규칙으로}
            ```

            기존 규칙의 `last_verified`도 관련 패턴이 다시 확인되면 오늘 날짜로 업데이트하세요.

            ### 5. patterns.md 업데이트

            새로 식별된 패턴이 있으면 추가하세요:
            ```markdown
            ### [{카테고리}] {패턴 제목}

            - **빈도**: low | medium | high
            - **심각도**: critical | major | minor
            - **출처**: attribution 분석 ({PR 목록})
            - **last_seen**: {오늘 YYYY-MM-DD}

            **설명**: {이 패턴이 왜 중요한지}
            ```

            기존 패턴의 빈도 조정: 같은 패턴이 이미 있으면 빈도를 올리고 `last_seen`을 업데이트.

            ### 6. 오래된 패턴 아카이브
            - patterns.md에서 `last_seen`이 6개월(180일) 이상 지난 엔트리 → archived-patterns.md로 이동
            - additional-rules.md에서 `last_verified`가 6개월 이상 지난 엔트리 → archived-patterns.md로 이동
            - `last_seen`/`last_verified` 필드가 없는 엔트리는 제외

            ## 중요 규칙
            - 기존 내용을 **절대 삭제하지 마세요**, 추가/업데이트만 하세요
            - 유의미한 패턴이 없으면 **아무 파일도 수정하지 마세요**
            - 최소 3회 이상 반복된 패턴만 학습 대상입니다
            - 한국어로 작성하세요

          claude_args: |
            --model ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "
              Read, Edit, Glob, Grep,
              Bash(jq *),
              Bash(gh api *)
            "

      - name: Commit and push learnings
        id: commit
        if: fromJSON(steps.attr_check.outputs.has_data) >= 3
        run: |
          if git diff --quiet .review-learnings/; then
            echo "learned=false" >> $GITHUB_OUTPUT
            echo "⏭️ No patterns extracted"
            exit 0
          fi

          # Claude의 수정을 임시 저장
          mkdir -p /tmp/learnings-backup
          cp .review-learnings/patterns.md /tmp/learnings-backup/ 2>/dev/null || true
          cp .review-learnings/false-positives.md /tmp/learnings-backup/ 2>/dev/null || true
          cp .review-learnings/additional-rules.md /tmp/learnings-backup/ 2>/dev/null || true
          cp .review-learnings/archived-patterns.md /tmp/learnings-backup/ 2>/dev/null || true

          BRANCH="chore/review-learnings"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # 브랜치를 main 기반으로 리셋 (merge 불필요 — Claude 출력에 누적 데이터 포함)
          git checkout -f -B "$BRANCH" "origin/$DEFAULT_BRANCH"

          # Claude의 수정을 복원
          cp /tmp/learnings-backup/* .review-learnings/ 2>/dev/null || true

          git add .review-learnings/patterns.md \
                  .review-learnings/false-positives.md \
                  .review-learnings/additional-rules.md \
                  .review-learnings/archived-patterns.md

          CHANGED=$(git diff --cached --name-only | sed 's|.review-learnings/||' | tr '\n' ', ' | sed 's/,$//')

          COMMIT_MSG=$(printf 'chore: learn patterns from attribution data\n\nUpdated: %s\n\n🤖 Auto-learned by PR Review Agent' "$CHANGED")
          git commit -m "$COMMIT_MSG"

          git push origin "$BRANCH" -u --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --head "$BRANCH" \
              --title "chore: review learnings 업데이트" \
              --body "🤖 Attribution 데이터에서 학습한 패턴을 반영합니다." \
          fi

          echo "learned=true" >> $GITHUB_OUTPUT
          echo "✅ Patterns committed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
